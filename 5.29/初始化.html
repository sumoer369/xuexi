<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="normalize.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ul,ol {
            list-style: none;
        }
        a {
            text-decoration: none;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: pink;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        我是一个盒子
    </div>
    <ul>
        <li>列表项1</li>
        <li>列表项2</li>
        <li>列表项3</li>
    </ul>
    <ol>
        <li>有序列表项1</li>
        <li>有序列表项2</li>
        <li>有序列表项3</li>
    </ol>
    <a href="https://www.baidu.com">这是一个链接</a>

    
</body>
</html>
