<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>响应式 Flex 导航栏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f5f7fa;
      height: 1500px;
    }

    /* 导航容器：Flex 横向布局 */
    .navbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 100px;
      background: #1e293b;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: #fff;
    }

    /* 汉堡按钮：默认隐藏 */
    .menu-toggle {
      display: none;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .hamburger:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }

    /* 菜单列表：PC 端横向 Flex */
    .nav-links {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 0.6rem 1rem;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-links .cta {
      margin-left: 0.5rem;
      background: #3b82f6;
      color: #fff;
    }

    .nav-links .cta:hover {
      background: #2563eb;
    }

    /* 手机端：≤768px 折叠为汉堡菜单 */
    @media (max-width: 768px) {
      .navbar {
        flex-wrap: nowrap;
      }

      .hamburger {
        display: flex;
      }

      /* 勾选 checkbox 时汉堡变 X */
      .menu-toggle:checked + .hamburger span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }

      .menu-toggle:checked + .hamburger span:nth-child(2) {
        opacity: 0;
      }

      .menu-toggle:checked + .hamburger span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }

      .nav-links {
        display: none;
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        padding: 0.5rem 0 1rem;
        gap: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: 0.5rem;
      }

      .menu-toggle:checked ~ .nav-links {
        display: flex;
      }

      .nav-links a {
        padding: 0.85rem 0.5rem;
      }

      .nav-links .cta {
        margin-left: 0;
        margin-top: 0.5rem;
        text-align: center;
      }
    }

    /* 演示内容 */
    main {
      max-width: 720px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      color: #334155;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="logo">MySite</a>

    <!-- 纯 CSS 开关：checkbox + label -->
    <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-hidden="true">
    <label for="menu-toggle" class="hamburger" aria-label="打开菜单">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <ul class="nav-links">
      <li><a href="#">首页</a></li>
      <li><a href="#">产品</a></li>
      <li><a href="#">关于</a></li>
      <li><a href="#">联系</a></li>
      <li><a href="#" class="cta">注册</a></li>
    </ul>
  </nav>

  <main>
    <h1>响应式导航栏示例</h1>
    <p>在 PC 端（宽度 &gt; 768px）菜单横向排列；缩小浏览器窗口或用手机打开，右上角会出现汉堡按钮，点击展开纵向菜单。</p>
  </main>

</body>
</html>
