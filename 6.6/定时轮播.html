<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }
        img {
            width: 100%;
            height: 100%;
        }
        .slider {
            width: 560px;
            height: 400px;
            overflow: hidden;
        }

        .slider-wrapper {
            width: 100%;
            height: 80%;
            display: block;
        }

        .slider-footer {
            height: 80px;
            background-color: rgba(100, 67, 68, 0.8);
            padding: 12px 12px 0 12px;
            position: relative;
        }

        .slider-footer .toggle {
            position: absolute;
            right: 0;
            top: 12px;
            display: flex;
        }

        /* .slider-footer .toggle button {
            margin-right: 12px;
            width: 28px;
            height: 28px;
            appearance: none;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        } */

        /* .slider-footer .toggle button:hover {
            background: rgba(255, 255, 255, 0.2);
        } */

        .slider-footer p {
            margin: 0;
            color: #fff;
            font-size: 18px;
            /* background-color: #fff; */
            margin-bottom: 10px;
        }

        .slider-indicator {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            align-items: center;
        }

        .slider-indicator li {
            width: 8px;
            height: 8px;
            margin: 4px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.4;
            cursor: pointer;
        }

        .slider-indicator li.active {
            width: 12px;
            height: 12px;
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="slider">
        <div class="slider-wrapper">
            <img src="D:/vscodexiangmu/6.4/img/1.jpg" alt="" />
        </div>
        <div class="slider-footer">
            <p>对人类来说会不会太超前了？</p>
            <ul class="slider-indicator">
                <li class="active"></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>
    </div>
    <div class="toggle">
        
            <!-- <button class="prev">&lt;</button>
            <button class="next">&gt;</button> -->
        
    </div>
    <script>

        const sliderData = [
            { url: 'D:/vscodexiangmu/6.4/img/1.jpg', title: '对人类来说会不会太超前了？', color: 'rgb(100, 67, 68)' },
            { url: 'D:/vscodexiangmu/6.4/img/2.jpg', title: '开启剑与雪的黑暗传说！', color: 'rgb(43, 35, 26)' },
            { url: 'D:/vscodexiangmu/6.4/img/3.jpg', title: '真正的jo剧出现了！', color: 'rgb(36, 31, 33)' },
            { url: 'D:/vscodexiangmu/6.4/img/4.jpg', title: '李玉刚：让世界通过B站看到东方大国文化！', color: 'rgb(139, 98, 66)' },
            { url: 'D:/vscodexiangmu/6.4/img/5.jpg', title: '快来分享你的寒假日常吧！', color: 'rgb(67, 90, 92)' },
        ]
        const img = document.querySelector('.slider-wrapper img')
        const p = document.querySelector('.slider-footer p')
        const color = document.querySelector('.slider-footer')
        let i = 0
        setInterval(function(){
            i++
            if(i == sliderData.length){
                i = 0
            }
            img.src = sliderData[i].url
            color.style.backgroundColor = sliderData[i].color
            p.textContent = sliderData[i].title
            document.querySelector('.slider-indicator .active').classList.remove('active')
            const li = document.querySelector(`.slider-indicator li:nth-child(${i+1})`).classList.add('active')
        },1000)
        
    </script>
</body>

</html>
