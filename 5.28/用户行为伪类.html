<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: pink;
            text-align: center;
            line-height: 200px;
        }
        .box:hover {
            background-color: red;
            color: #0f13f1;
            
        }
        .search {
            width: 100px;
        }
        .search:focus {
            width: 200px;
            transition: all 0.5s;
            
        }
    </style>
</head>
<body>
    <div class="box">文字</div>
    <input type="text" class="search">
</body>
</html>
