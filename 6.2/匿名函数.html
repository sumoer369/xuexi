        function getTime(zong=0){
            let h = parseInt(zong/60/60%24)
            let m = parseInt(zong/60%60)
            let s = parseInt(zong%60)
            h = h<10?'0'+ h : h
            m = m<10?'0'+ m : m
            s = s<10?'0'+ s : s
            return `计算后的是${h}时${m}分${s}秒`
        }
        let miao = +prompt('请输入秒数')
        document.write(getTime(miao))
