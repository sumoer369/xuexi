<body>
    <script>

        function set99() {
            for (let i = 1; i <= 9; i++) {
                for (let j = 1; j <= i; j++) {
                    document.write(`<span>${j}X${i}=${i * j}</span>`)
                }
                document.write("<br>")
            }
        }
        function sum(a,b){
            return a+b
        }
        document.write(sum(1,2))

    </script>
