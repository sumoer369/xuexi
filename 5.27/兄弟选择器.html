<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 + h2 {
            color: red;
        }
        h3 ~ h2 {
            color: rgb(4, 240, 122);
        }
    </style>
</head>
<body>
    <h1>h1+h2</h1>
    <h2>第一个h1+h2</h2>
    <h2>h1+h2</h2>
    <h2>h1+h2</h2>
    <h2>h1+h2</h2>
    <h3>h3~h2</h3>
    <h2>第一个h3~h2</h2>
    <h2>h3~h2</h2>
    <h2>h3~h2</h2>
    <h2>h3~h2</h2>
    <h2>h3~h2</h2>

    
</body>
</html>
