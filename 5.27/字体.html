<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 字体装饰 - 移除链接下划线 */
        a {
            text-decoration: none;
        }
        /* 字体装饰 - 添加下划线 */
        .underline {
            text-decoration: underline;
        }
        /* 字体装饰 - 添加删除线 */
        .line-through {
            text-decoration: line-through;
        }
        /* 字体装饰 - 添加上划线 */
        .overline {
            text-decoration: overline;
        }
        /* 文字颜色 - 粉色 */
        .pink {
            color: pink;
        }
        /* 文字颜色 - 16进制红色 */
        .color16 {
            color: #ff0000;
        }
        /* 文字颜色 - RGB格式 */
        .rgb {
            color: rgb(95, 15, 186);
        }
        /* 文字颜色 - RGBA格式（带透明度） */
        .rgba {
            color: rgba(95, 15, 186, 0.6);
            background-color: #0382be;
        }
        /* 字体设置 - 使用宋体 */
        p {
            font-family: "宋体", sans-serif;
        }
        /* 字体大小 - 30px */
        .font30 {
            font-size: 30px;
        }
        /* 字体大小 - 20px */
        .font20 {
            font-size: 20px;
        }
        /* 字体样式 - 斜体 */
        .italic {
            font-style: italic;
        }
        /* 字体样式 - 正常（取消斜体） */
        .normal {
            font-style: normal;
        }
        /* 字体粗细 - 粗体（700） */
        .cu {
            font-weight: 700;
        }
        /* 字体粗细 - 正常（400） */
        .bucu {
            font-weight: 400
        }
    </style>
</head>
<body>
    <div class="pink">
        文字颜色
    </div>
    <div class="color16">
        文字颜色
    </div>
    <div class="rgb">
        文字颜色
    </div>
    <div class="rgba">
        文字颜色
    </div>
    <p>
        字体样式
    </p>
    <p class="font30">
        字体样式
    </p>
    <p class="font20">
        字体样式
    </p>
    <p class="italic">
           字体样式
    </p>
    <em class="normal">
        字体样式
    </em>
    <p class="cu">
        字体样式
    </p>
    <p class="bucu">
        字体样式
    </p>
    <a>
        字体装饰
    </a>
    <p class="underline">
        字体装饰
    </p>
    <p class="line-through">
        字体装饰
    </p>
    <p class="overline">
        字体装饰
    </p>
</body>
</html>
