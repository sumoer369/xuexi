<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- font简写 -->
    <style>
        /* 字体简写 */
        div {
            margin: 0 auto;
            width: 120px;
            height: 50px;
            background-color: pink;
        }
        p {
            color: red;
            font: italic  10px/1.5 "宋体", sans-serif;
        }
    </style>
</head>
<body>
    <div>
    <p>
        字体简写
    </p>
    </div>
</body>
</html>
